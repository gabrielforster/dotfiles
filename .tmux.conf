set-option -sa terminal-overrides ",xterm*:Tc"
set -s escape-time 0
set -g allow-passthrough

set -g mouse on
set -g base-index 1

# --- blue status bar ---
set -g status-interval 5
set -g status-justify left
set -g status-style 'bg=#1c2733 fg=#7fb8d8'

# left: session name, darker blue block
set -g status-left-length 30
set -g status-left '#[bg=#1e3a5f,fg=#e6f0f7,bold] #S #[bg=#1c2733,fg=#1e3a5f]'

# right: date + time
set -g status-right-length 60
set -g status-right '#[fg=#1e3a5f]#[bg=#1e3a5f,fg=#e6f0f7] %Y-%m-%d #[fg=#5eacd3]#[bg=#5eacd3,fg=#0d1620,bold] %H:%M '

# windows
set -g window-status-format '#[fg=#7fb8d8] #I #W '
set -g window-status-current-format '#[bg=#5eacd3,fg=#0d1620,bold] #I #W '
set -g window-status-separator ''

# panes
set -g pane-border-style 'fg=#2f4257'
set -g pane-active-border-style 'fg=#5eacd3'
set -g message-style 'bg=#1e3a5f fg=#e6f0f7'

set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'

bind-key j select-pane -D
bind-key h select-pane -L
bind-key k select-pane -U
bind-key l select-pane -R

set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
